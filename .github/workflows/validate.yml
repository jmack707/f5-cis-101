name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tooling
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gettext-base python3-yaml

      - name: Run static validation
        run: |
          chmod +x validate.sh
          ./validate.sh
