# Lab 3.2 - AS3 ConfigMap that publishes a BIG-IP VS pointing at the NGINX IC.
# TEMPLATED — render via ../../lab.sh apply <dir> (or: set -a; source lab-vars.env; set +a; envsubst < FILE | kubectl apply -f -)
# FIX: lab used schemaVersion 3.10.0, which is BELOW the documented 3.18+ floor.
# Bumped to 3.50.0; set <= the AS3 build installed on your BIG-IP.
# Namespace must match 04-cis-service.yaml. servicePort 80 matches the
# service `port` (CIS v2.2.2+ expects port, not nodeport).
apiVersion: v1
kind: ConfigMap
metadata:
  name: f5-as3-declaration
  namespace: nginx-ingress
  labels:
    f5type: virtual-server
    as3: "true"
data:
  template: |
    {
      "class": "AS3",
      "declaration": {
        "class": "ADC",
        "schemaVersion": "${AS3_SCHEMA_VERSION}",
        "id": "urn:uuid:33045210-3ab8-4636-9b2a-c98d22ab915d",
        "label": "http",
        "remark": "A1 example",
        "${AS3_TENANT}": {
          "class": "Tenant",
          "A1": {
            "class": "Application",
            "template": "generic",
            "hello_world_nginx_vs": {
              "class": "Service_HTTP",
              "virtualAddresses": [
                "${NGINX_FRONT_VIP}"
              ],
              "pool": "web_pool",
              "virtualPort": 80
            },
            "web_pool": {
              "class": "Pool",
              "monitors": [
                "http"
              ],
              "members": [
                {
                  "servicePort": 80,
                  "shareNodes": true,
                  "serverAddresses": []
                }
              ]
            }
          }
        }
      }
    }
