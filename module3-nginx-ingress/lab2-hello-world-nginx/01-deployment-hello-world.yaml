# Lab 3.2 - f5-hello-world app (same as prior modules)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: f5-hello-world-web
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: f5-hello-world-web
  template:
    metadata:
      labels:
        app: f5-hello-world-web
    spec:
      containers:
        - name: f5-hello-world-web
          image: nginxdemos/nginx-hello
          imagePullPolicy: IfNotPresent
          env:
            - name: service_name
              value: f5-hello-world-web
          ports:
            - containerPort: 80
              protocol: TCP
