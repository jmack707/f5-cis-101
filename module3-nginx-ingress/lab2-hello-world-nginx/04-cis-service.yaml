# Lab 3.2 - Service CIS watches to build the BIG-IP pool that targets the
# NGINX Ingress Controller pods. Namespace must match the ConfigMap below
# (CIS v2.1+). servicePort in the AS3 member must match `port` here (CIS v2.2.2+).
apiVersion: v1
kind: Service
metadata:
  name: nginx-ingress-hello-world
  namespace: nginx-ingress
  labels:
    cis.f5.com/as3-tenant: AS3
    cis.f5.com/as3-app: A1
    cis.f5.com/as3-pool: web_pool
spec:
  type: NodePort
  selector:
    app: nginx-ingress
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
