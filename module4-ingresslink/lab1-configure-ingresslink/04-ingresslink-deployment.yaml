# Lab 4.1 - CIS controller for IngressLink (CRD mode).
# TEMPLATED — render via ../../lab.sh apply <dir> (or: set -a; source lab-vars.env; set +a; envsubst < FILE | kubectl apply -f -)
#
# KEY CHANGE vs the lab: the lab passes BOTH "--custom-resource-mode=true" and
# "--ingress-link-mode=true". Current CIS folds IngressLink into CRD mode -
# `--ingress-link-mode` is no longer documented or listed in config-parameters,
# and the IngressLink prerequisites now require only --custom-resource-mode=true.
# So that flag is dropped here.
#
# Also hardened (non-root, dropped caps, probes), switched to
# credentials-directory, and converted from flannel VXLAN to STATIC ROUTES
# (--static-routing-mode=true + --orchestration-cni=flannel) like module 2.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-bigip-ctlr           # lab name kept for cleanup symmetry
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-bigip-ctlr
  template:
    metadata:
      labels:
        app: k8s-bigip-ctlr
    spec:
      serviceAccountName: k8s-bigip-ctlr
      securityContext:
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
      volumes:
        - name: bigip-creds
          secret:
            secretName: f5-bigip-ctlr-login
      containers:
        - name: k8s-bigip-ctlr
          image: "${CIS_IMAGE}"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            httpGet: { path: /health, port: 8080, scheme: HTTP }
            initialDelaySeconds: 15
            periodSeconds: 120
            timeoutSeconds: 15
          readinessProbe:
            httpGet: { path: /health, port: 8080, scheme: HTTP }
            initialDelaySeconds: 30
            periodSeconds: 120
            timeoutSeconds: 15
          volumeMounts:
            - name: bigip-creds
              mountPath: "/tmp/creds"
              readOnly: true
          command: ["/app/bin/k8s-bigip-ctlr"]
          args:
            - --credentials-directory=/tmp/creds
            - --bigip-partition=${BIGIP_PARTITION}
            - --pool-member-type=cluster
            - --static-routing-mode=true       # write routes to BIG-IP, no VXLAN
            - --orchestration-cni=flannel       # cluster CNI
            - --insecure=true                 # lab/non-prod only
            - --log-level=INFO
            - --custom-resource-mode=true      # CRD mode enables IngressLink
            - --log-as3-response=true
      dnsPolicy: ClusterFirst
