# AS3 ConfigMap (lab 1.3) - kept as ConfigMap/AS3, NOT converted to CRD.
# TEMPLATED — render via ../../lab.sh apply <dir> (or: set -a; source lab-vars.env; set +a; envsubst < FILE | kubectl apply -f -)
# Only change vs the lab: schemaVersion bumped off the 3.18.0 floor.
# Set schemaVersion to a value <= the AS3 RPM build installed on your BIG-IP
# (check: iApps > Package Management LX, or `restcurl /mgmt/shared/appsvcs/info`).
apiVersion: v1
kind: ConfigMap
metadata:
  name: f5-as3-declaration
  namespace: default
  labels:
    f5type: virtual-server
    as3: "true"
data:
  template: |
    {
        "class": "AS3",
        "declaration": {
            "class": "ADC",
            "schemaVersion": "${AS3_SCHEMA_VERSION}",
            "id": "urn:uuid:33045210-3ab8-4636-9b2a-c98d22ab915d",
            "label": "http",
            "remark": "A1 example",
            "${AS3_TENANT}": {
                "class": "Tenant",
                "A1": {
                    "class": "Application",
                    "template": "generic",
                    "hello_world_vs": {
                        "class": "Service_HTTP",
                        "virtualAddresses": [
                            "${NODEPORT_VIP}"
                        ],
                        "pool": "web_pool",
                        "virtualPort": 80
                    },
                    "web_pool": {
                        "class": "Pool",
                        "monitors": [
                            "http"
                        ],
                        "members": [
                            {
                                "servicePort": 80,
                                "shareNodes": true,
                                "serverAddresses": []
                            }
                        ]
                    }
                }
            }
        }
    }
