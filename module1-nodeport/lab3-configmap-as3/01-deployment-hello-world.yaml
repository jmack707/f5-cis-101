# f5-hello-world app (lab 1.2 / 1.3 - identical deployment)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: f5-hello-world-web
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: f5-hello-world-web
  template:
    metadata:
      labels:
        app: f5-hello-world-web
    spec:
      containers:
        - name: f5-hello-world-web
          image: f5devcentral/f5-hello-world:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: service_name
              value: f5-hello-world-web
          ports:
            - containerPort: 8080
              protocol: TCP
