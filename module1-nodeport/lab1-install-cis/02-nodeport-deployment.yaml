# CIS controller - NodePort mode (modernized from lab 1.1)
# TEMPLATED — render via ../../lab.sh apply <dir> (or: set -a; source lab-vars.env; set +a; envsubst < FILE | kubectl apply -f -)
# Matches the current F5 sample-k8s-bigip-ctlr.yaml: non-root, dropped caps,
# seccomp, health probes, and credentials-directory (volume-mounted secret).
# Every arg verified against:
#   https://clouddocs.f5.com/containers/latest/userguide/config-parameters.html
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-bigip-ctlr-deployment
  namespace: kube-system
spec:
  replicas: 1                       # DO NOT increase the replica count
  selector:
    matchLabels:
      app: k8s-bigip-ctlr-deployment
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: k8s-bigip-ctlr-deployment
    spec:
      serviceAccountName: k8s-bigip-ctlr
      securityContext:
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
      volumes:
        - name: bigip-creds
          secret:
            secretName: f5-bigip-ctlr-login
      containers:
        - name: k8s-bigip-ctlr
          image: "${CIS_IMAGE}"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 120
            timeoutSeconds: 15
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 120
            timeoutSeconds: 15
            failureThreshold: 3
            successThreshold: 1
          volumeMounts:
            - name: bigip-creds
              mountPath: "/tmp/creds"
              readOnly: true
          command: ["/app/bin/k8s-bigip-ctlr"]
          args:
            - --credentials-directory=/tmp/creds   # reads username/password/url files
            - --bigip-partition=${BIGIP_PARTITION}
            - --pool-member-type=nodeport
            - --insecure=true                       # lab/non-prod only; prefer trusted-certs-cfgmap
            - --log-level=INFO
            - --custom-resource-mode=false          # process ConfigMap/Ingress (not CRDs)
            - --log-as3-response=true
            - --as3-validation=true
      dnsPolicy: ClusterFirst
