# Ingress (lab 1.2) - kept as legacy Ingress, NOT converted to VirtualServer CRD.
# TEMPLATED — render via ../../lab.sh apply <dir> (or: set -a; source lab-vars.env; set +a; envsubst < FILE | kubectl apply -f -)
# virtual-server.f5.com/* annotations are still supported on current CIS.
# apiVersion networking.k8s.io/v1 is current.
#
# IngressClass is REQUIRED: CIS 2.x processes only Ingresses that reference the
# "f5" IngressClass via spec.ingressClassName (created in 00-ingressclass-f5.yaml).
# Without it CIS logs "[CORE] Ingress class resource not found" and builds no VS.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: f5-hello-world-web
  namespace: default
  annotations:
    # Each virtual-server.f5.com/* annotation maps to a BIG-IP setting (see the README "Anatomy").
    virtual-server.f5.com/partition: "${BIGIP_PARTITION}"   # which BIG-IP partition to build the VS in
    # VIP on the BIG-IP external VLAN. Lab YAML uses 10.1.10.101; the lab
    # narrative/screenshots reference 10.1.1.4 - set this to a free VIP that
    # matches your UDF topology.
    virtual-server.f5.com/ip: "${NODEPORT_VIP}"             # the VIP the virtual server listens on
    virtual-server.f5.com/http-port: "80"                  # VS listener port
    virtual-server.f5.com/ssl-redirect: "false"            # no HTTP->HTTPS redirect
    virtual-server.f5.com/balance: "round-robin"           # BIG-IP pool load-balancing method
    virtual-server.f5.com/health: |                        # BIG-IP health monitor attached to the pool
      [
        {
          "path":     "f5.hello.world/",
          "send":     "HTTP GET /",
          "interval": 5,
          "timeout":  10
        }
      ]
spec:
  ingressClassName: f5          # claim ticket — CIS only builds a VS for the "f5" IngressClass
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: f5-hello-world-web   # CIS reads THIS Service's endpoints -> BIG-IP pool members
                port:
                  number: 80               # the Service port (not the pod port; CIS maps it to the nodePort)
